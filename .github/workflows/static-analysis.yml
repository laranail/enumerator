# Dedicated PHPStan job with `--error-format=github` so static-analysis
# errors surface as inline annotations on PR diffs. The PHPStan step in
# `ci.yml` already runs across the full PHP matrix; this workflow exists
# only to add the inline-annotation channel for reviewers. Do not delete
# without first updating `ci.yml` to use `--error-format=github` too.

name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/phpstan analyse --no-progress --error-format=github
