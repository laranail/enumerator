name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Verify Alpine bundle SRI
        # Guards against the bundled resources/js/alpine.min.js drifting
        # from the integrity hash recorded in config/enumerator.php.
        # The env() stub here lets us read the file's default value
        # without booting Laravel.
        run: |
          BUNDLED_SRI="sha384-$(shasum -a 384 -b resources/js/alpine.min.js | awk '{print $1}' | xxd -r -p | base64)"
          PINNED_SRI=$(php -r "function env(\$k, \$d = null) { return \$d; } echo (require 'config/enumerator.php')['alpine']['integrity'];")
          if [ "$BUNDLED_SRI" != "$PINNED_SRI" ]; then
            echo "::error::Alpine SRI mismatch"
            echo "  bundled: $BUNDLED_SRI"
            echo "  pinned:  $PINNED_SRI"
            exit 1
          fi
          echo "Alpine SRI verified: $PINNED_SRI"

      - name: Pint (format check)
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Pest (with coverage)
        # Coverage gate ratchets up as the unit-test backfill lands.
        # Currently 85% (raised from 80% in v0.2.0 prep). Target: 90% on
        # stable releases.
        run: vendor/bin/pest --coverage --min=85
